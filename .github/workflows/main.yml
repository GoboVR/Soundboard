name: Build and Release

# Push a tag like "v1.0.0" to trigger a build + attach both the portable
# exe and the installer to a GitHub Release automatically. You can also
# trigger it manually from the Actions tab (workflow_dispatch) to test a
# build without releasing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Show exactly what's being built
        run: |
          echo "Branch/ref: $env:GITHUB_REF"
          echo "Commit SHA: $env:GITHUB_SHA"
          git log -1 --format="Commit: %H%nMessage: %s%nDate: %ci"
          echo "---"
          echo "APP_VERSION in soundboard.py:"
          Select-String -Path soundboard.py -Pattern "^APP_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build portable exe
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed `
            --name "GobosSoundboard" `
            --icon "assets\icon.ico" `
            --add-data "assets\icon.ico;." `
            --collect-all sounddevice `
            --collect-all soundfile `
            --collect-all keyboard `
            soundboard.py

      - name: Rename portable exe for release clarity
        run: Copy-Item "dist\GobosSoundboard.exe" "dist\GobosSoundboard-Portable.exe"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          $version = (Select-String -Path soundboard.py -Pattern '^APP_VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          echo "Building installer for version: $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer.iss

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: GobosSoundboard-Portable
          path: dist/GobosSoundboard-Portable.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GobosSoundboard-Setup
          path: installer_output/GobosSoundboard-Setup.exe

      - name: Attach both to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GobosSoundboard-Portable.exe
            installer_output/GobosSoundboard-Setup.exe
